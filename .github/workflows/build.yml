name: Build AutoCut

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install customtkinter moviepy pydub numpy matplotlib imageio-ffmpeg pyinstaller

      - name: Build AutoCut.app
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "AutoCut" main.py

      - name: Create DMG
        run: |
          mkdir /tmp/autocut_dmg
          ditto dist/AutoCut.app /tmp/autocut_dmg/AutoCut.app
          ln -s /Applications /tmp/autocut_dmg/Applications
          hdiutil create -volname "AutoCut" -srcfolder /tmp/autocut_dmg -ov -format UDZO dist/AutoCut-Mac.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AutoCut-Mac
          path: dist/AutoCut-Mac.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install customtkinter moviepy pydub numpy matplotlib imageio-ffmpeg pyinstaller

      - name: Build AutoCut.exe
        run: pyinstaller --noconfirm --onedir --windowed --name "AutoCut" main.py

      - name: Create installer
        run: |
          choco install innosetup -y
          iscc autocut_setup.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AutoCut-Windows
          path: dist/AutoCut-Windows-Setup.exe
